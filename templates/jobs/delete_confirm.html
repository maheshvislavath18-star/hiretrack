<h2>Delete Application</h2>

<p>Are you sure you want to delete this application?</p>

<p><strong>{{ application.job.title }}</strong> - {{ application.job.company }}</p>

<form method="POST">
    {% csrf_token %}
    <button type="submit">Yes, Delete</button>
</form>

<a href="{% url 'my_applications' %}">Cancel</a>
